<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --navy: #1B2A4A;
  --navy-light: #2E4272;
  --crimson: #9B2335;
  --gold: #C4963A;
  --cream: #F5F0E8;
  --ice: #F0F4FA;
  --tan: #C4B99A;
  --border: #E5E0D8;
  --text: #1A1A2E;
  --muted: #6B7280;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--text); }

/* NAV */
.nav { background: var(--navy); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 30px; height: 30px; border-radius: 50%; border: 2.5px solid var(--gold); display: flex; align-items: center; justify-content: center; }
.logo-360 { font-size: 9px; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
.logo-text { font-size: 16px; font-weight: 700; color: #fff; }
.logo-text span { color: var(--gold); }
.nav-links { display: flex; gap: 20px; list-style: none; }
.nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; transition: color .2s; }
.nav-links a:hover { color: #fff; }
.nav-links a.buzz-link { color: var(--gold); font-weight: 700; }

/* HERO */
.hero { background: var(--navy); padding: 36px 24px 32px; position: relative; overflow: hidden; }
.hero-geo { position: absolute; opacity: 0.06; border-radius: 50%; }
.hero-geo-1 { top: 10px; right: 40px; width: 160px; height: 160px; border: 3px solid var(--gold); }
.hero-geo-2 { top: 40px; right: 80px; width: 100px; height: 100px; border: 3px solid var(--crimson); }
.hero-geo-3 { bottom: -20px; left: 5%; width: 80px; height: 80px; border: 3px solid var(--gold); border-radius: 0; transform: rotate(45deg); }
.hero-inner { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
.team-pills { display: flex; gap: 8px; margin-bottom: 12px; }
.pill { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); }
.pill-dcx { color: var(--crimson); border-color: rgba(155,35,53,0.4); background: rgba(155,35,53,0.1); }
.pill-cdps { color: #8fa8d4; border-color: rgba(143,168,212,0.3); background: rgba(143,168,212,0.08); }
.pill-cams { color: var(--gold); border-color: rgba(196,150,58,0.3); background: rgba(196,150,58,0.1); }
.hero h1 { font-size: 42px; font-weight: 800; color: #fff; line-height: 1.05; letter-spacing: -0.5px; }
.hero h1 span { color: var(--gold); }
.hero-tagline { font-size: 14px; color: rgba(255,255,255,0.45); letter-spacing: 0.15em; margin: 6px 0 18px; }
.hero-btns { display: flex; gap: 12px; }
.btn-primary { background: var(--gold); color: var(--navy); border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.25); padding: 10px 22px; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; }

/* SECTION COMMON */
.section { padding: 40px 24px; }
.section-white { background: #fff; }
.section-inner { max-width: 720px; margin: 0 auto; }
.section-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.section-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.section-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; max-width: 480px; }

/* STATUS BADGES */
.badge-next { display: inline-flex; align-items: center; gap: 4px; background: #FFF3CD; color: #856404; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; }
.badge-next::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 1.4s infinite; }
.badge-upcoming { display: inline-block; background: var(--ice); color: var(--navy-light); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* FEATURED EVENT CARD */
.featured-card { background: #fff; border-radius: 14px; border: 2px solid var(--gold); overflow: hidden; margin-bottom: 18px; box-shadow: 0 4px 24px rgba(196,150,58,0.12); }
.feat-header { background: var(--navy); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.feat-header-left { display: flex; align-items: center; gap: 12px; }
.feat-badge { background: var(--gold); color: var(--navy); font-size: 9px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 4px; }
.feat-title { font-size: 16px; font-weight: 700; color: #fff; }
.countdown { display: flex; gap: 8px; align-items: center; }
.cd-unit { text-align: center; background: rgba(255,255,255,0.08); border-radius: 6px; padding: 5px 8px; min-width: 44px; }
.cd-num { font-size: 18px; font-weight: 800; color: var(--gold); display: block; line-height: 1; }
.cd-label { font-size: 7px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
.cd-sep { font-size: 14px; color: rgba(255,255,255,0.2); }
.feat-body { display: flex; }
.feat-info { flex: 1; padding: 18px 20px; border-right: 1px solid var(--border); }
.feat-date { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.feat-host { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.feat-host-dot { width: 7px; height: 7px; border-radius: 50%; }
.feat-agenda { flex: 1; padding: 18px 20px; }
.agenda-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.agenda-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.agenda-item:last-child { border-bottom: none; }
.agenda-time { background: var(--cream); color: var(--navy); font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px; white-space: nowrap; margin-top: 1px; }
.agenda-content { flex: 1; }
.agenda-title { font-size: 12px; font-weight: 600; color: var(--navy); }
.agenda-desc { font-size: 11px; color: var(--muted); line-height: 1.3; }
.agenda-presenter { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.agenda-avatar { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
.agenda-p-name { font-size: 11px; font-weight: 700; color: var(--navy); }
.agenda-p-team { font-size: 8px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
.agenda-p-topic { font-size: 10px; color: var(--muted); font-style: italic; }
.feat-footer { background: var(--navy); padding: 12px 20px; display: flex; gap: 8px; }
.btn-calendar { display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--gold); color: var(--navy); border: none; padding: 10px 16px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; flex: 1; text-decoration: none; }
.btn-join { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 10px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; text-decoration: none; }

/* EVENT GRID */
.event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.event-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
.event-header { padding: 16px 18px 14px; border-bottom: 1px solid var(--border); }
.event-title { font-size: 15px; font-weight: 700; color: var(--navy); margin: 6px 0 4px; }
.event-date { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.event-host { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.event-host-dot { width: 6px; height: 6px; border-radius: 50%; }
.event-agenda { padding: 14px 18px; }
.event-footer { padding: 12px 18px; background: var(--navy); display: flex; gap: 6px; margin-top: auto; }

/* WINS */
.wins-section { background: var(--navy); padding: 36px 24px; overflow: hidden; }
.wins-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; max-width: 720px; margin-left: auto; margin-right: auto; }
.wins-title { font-size: 18px; font-weight: 700; color: #fff; }
.wins-title em { color: var(--gold); font-style: normal; }
.wins-actions { display: flex; gap: 8px; align-items: center; }
.wins-counter { font-size: 10px; color: rgba(255,255,255,0.4); margin-right: 4px; }
.btn-win-submit { background: var(--gold); color: var(--navy); border: none; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
.wins-track-wrap { max-width: 720px; margin: 0 auto; position: relative; overflow: hidden; }
.wins-track { display: flex; gap: 14px; transition: transform 0.6s cubic-bezier(.4,0,.2,1); width: max-content; }
.win-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; width: 220px; flex-shrink: 0; position: relative; overflow: hidden; }
.win-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 4px 0 0 4px; }
.win-card-dcx::before { background: var(--crimson); }
.win-card-cdps::before { background: #4a6fa5; }
.win-card-cams::before { background: var(--gold); }
.win-team { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.win-team-dcx { color: var(--crimson); }
.win-team-cdps { color: #8fa8d4; }
.win-team-cams { color: var(--gold); }
.win-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 5px; }
.win-desc { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.4; }
.win-date { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 8px; }
.wins-dots { display: flex; gap: 6px; justify-content: center; margin-top: 14px; max-width: 720px; margin-left: auto; margin-right: auto; }
.wins-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; transition: all .3s; }
.wins-dot.active { background: var(--gold); width: 20px; border-radius: 3px; }

/* TEAM */
.team-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
.team-tab { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); transition: all .2s; }
.team-tab.active-dcx { background: var(--crimson); color: #fff; border-color: var(--crimson); }
.team-tab.active-cdps { background: var(--navy); color: #fff; border-color: var(--navy); }
.team-tab.active-cams { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.team-placeholder { text-align: center; padding: 50px 20px; }
.team-placeholder-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.4; }
.team-placeholder-text { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.team-placeholder-sub { font-size: 12px; color: var(--muted); }
.team-panel { display: none; }
.team-panel.visible { display: block; }
.manager-group { margin-bottom: 22px; }
.manager-header { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 10px; padding-left: 2px; display: flex; align-items: center; gap: 8px; }
.manager-header::before { content: ''; width: 3px; height: 16px; border-radius: 2px; }
.manager-header.mgr-dcx::before { background: var(--crimson); }
.manager-header.mgr-cdps::before { background: var(--navy); }
.manager-header.mgr-cams::before { background: var(--gold); }
.team-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.team-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: transform .2s, box-shadow .2s; }
.team-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.tc-top { height: 40px; position: relative; }
.tc-top-dcx { background: linear-gradient(135deg, var(--crimson), #c0445a); }
.tc-top-cdps { background: linear-gradient(135deg, var(--navy), var(--navy-light)); }
.tc-top-cams { background: linear-gradient(135deg, var(--gold), #d4ad5a); }
.tc-geo { position: absolute; right: 10px; top: 6px; width: 26px; height: 26px; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 50%; }
.tc-avatar { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; position: absolute; bottom: -22px; left: 14px; z-index: 2; overflow: hidden; }
.tc-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.tc-body { padding: 28px 14px 14px; }
.tc-name { font-size: 13px; font-weight: 700; color: var(--navy); }
.tc-role { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.tc-divider { height: 1px; background: var(--border); margin: 6px 0; }
.tc-fact { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 5px; }
.tc-fact-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
.tc-fact-val { font-size: 10px; color: var(--text); line-height: 1.3; }
.tc-fact-val b { color: var(--navy); }
.tc-fact-talent { font-style: italic; color: var(--muted); }
.btn-view-all { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--navy); cursor: pointer; border: none; background: none; padding: 0; text-decoration: none; }

/* THE BUZZ */
.buzz-section { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); padding: 36px 24px; }
.buzz-inner { max-width: 720px; margin: 0 auto; }
.buzz-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.buzz-title { font-size: 20px; font-weight: 700; color: #fff; }
.buzz-title em { color: var(--gold); font-style: normal; }
.buzz-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
.buzz-grid { display: flex; gap: 16px; }
.buzz-card { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
.buzz-label { font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.buzz-question { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 12px; line-height: 1.4; }
.buzz-options { display: flex; flex-direction: column; gap: 6px; }
.buzz-option { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 8px 12px; cursor: pointer; transition: all .2s; }
.buzz-option:hover { background: rgba(196,150,58,0.15); border-color: rgba(196,150,58,0.3); }
.buzz-option.voted { background: rgba(196,150,58,0.2); border-color: var(--gold); }
.buzz-radio { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.buzz-option.voted .buzz-radio { border-color: var(--gold); background: var(--gold); }
.buzz-option.voted .buzz-radio::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--navy); }
.buzz-opt-text { font-size: 12px; color: rgba(255,255,255,0.7); flex: 1; }
.buzz-option.voted .buzz-opt-text { color: #fff; font-weight: 600; }
.buzz-textarea { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 10px 12px; font-size: 12px; color: rgba(255,255,255,0.5); width: 100%; outline: none; resize: none; height: 40px; font-family: inherit; }
.buzz-textarea:focus { border-color: rgba(196,150,58,0.4); color: #fff; }
.buzz-hint { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 8px; }
.buzz-submit-btn { background: var(--gold); color: var(--navy); border: none; padding: 6px 14px; border-radius: 5px; font-size: 10px; font-weight: 700; cursor: pointer; margin-top: 8px; }

/* STATS */
.stats-bar { background: var(--navy); padding: 16px 24px; display: flex; justify-content: center; gap: 36px; }
.stat { text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--gold); display: block; }
.stat-label { font-size: 9px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.08em; }

/* ARCHIVE */
.archive-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.archive-tab { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); transition: all .2s; }
.archive-tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.past-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.past-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 14px; }
.past-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.past-title { font-size: 13px; font-weight: 600; color: var(--navy); }
.past-date { font-size: 10px; color: var(--muted); }
.past-st { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.past-st span { color: var(--navy); font-weight: 600; }
.past-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
.past-links { display: flex; gap: 5px; flex-wrap: wrap; }
.past-link { font-size: 10px; font-weight: 700; color: var(--navy); padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border); text-decoration: none; }
.star-row { display: flex; align-items: center; gap: 3px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.star-label { font-size: 10px; color: var(--muted); margin-right: 5px; }
.star { font-size: 18px; cursor: pointer; color: var(--border); transition: color .15s, transform .15s; user-select: none; }
.star:hover, .star.lit { color: var(--gold); }
.star:hover { transform: scale(1.2); }
.star-msg { font-size: 10px; color: var(--gold); font-weight: 700; margin-left: 8px; opacity: 0; transition: opacity .3s; }
.star-msg.show { opacity: 1; }

/* WINS ARCHIVE */
.wins-archive-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.wa-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 14px; border-left: 4px solid; }
.wa-card-dcx { border-left-color: var(--crimson); }
.wa-card-cdps { border-left-color: var(--navy); }
.wa-card-cams { border-left-color: var(--gold); }
.wa-team { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.wa-team-dcx { color: var(--crimson); }
.wa-team-cdps { color: var(--navy); }
.wa-team-cams { color: var(--gold); }
.wa-name { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.wa-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 5px; }
.wa-date { font-size: 10px; color: var(--tan); }

/* SUBMIT */
.submit-section { background: var(--navy); padding: 36px 24px; text-align: center; }
.submit-section h2 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.submit-section p { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 16px; max-width: 400px; margin-left: auto; margin-right: auto; line-height: 1.5; }
.submit-btns { display: flex; gap: 12px; justify-content: center; }
.btn-st { background: var(--gold); color: var(--navy); border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn-win { background: var(--crimson); color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }

/* FOOTER */
.footer { background: #1A1A2E; padding: 24px 24px 18px; }
.footer-inner { max-width: 720px; margin: 0 auto; }
.footer-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.footer-brand { font-size: 16px; font-weight: 700; color: #fff; }
.footer-brand span { color: var(--gold); }
.footer-tagline { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 2px; }
.footer-director { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; }
.footer-director span { color: rgba(255,255,255,0.55); }
.footer-pills { display: flex; gap: 8px; }
.footer-pill { font-size: 10px; font-weight: 600; padding: 3px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
.footer-copy { font-size: 10px; color: rgba(255,255,255,0.2); }

/* WELCOME BANNER */
.welcome-banner { background: linear-gradient(135deg, rgba(196,150,58,0.08), rgba(196,150,58,0.03)); border: 1px solid rgba(196,150,58,0.2); border-radius: 12px; padding: 18px 22px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 14px; position: relative; }
.welcome-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.welcome-content { flex: 1; }
.welcome-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.welcome-text { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.welcome-cta { background: var(--gold); color: var(--navy); border: none; padding: 6px 16px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
.welcome-close { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 16px; color: var(--muted); cursor: pointer; padding: 0; line-height: 1; }

/* CONFETTI */
.confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
.confetti-piece { position: absolute; width: 8px; height: 8px; top: -10px; animation: confetti-fall 2.5s ease-in forwards; }
@keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

/* LOADING */
.loading { text-align: center; padding: 60px 20px; color: var(--muted); }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* RESPONSIVE */
@media (max-width: 768px) {
  .nav { padding: 0 16px; }
  .nav-links { gap: 12px; }
  .nav-links a { font-size: 11px; }
  .hero h1 { font-size: 32px; }
  .feat-body { flex-direction: column; }
  .feat-info { border-right: none; border-bottom: 1px solid var(--border); }
  .event-grid { grid-template-columns: 1fr; }
  .team-cards { grid-template-columns: 1fr 1fr; }
  .past-grid, .wins-archive-grid { grid-template-columns: 1fr; }
  .buzz-grid { flex-direction: column; }
  .countdown { gap: 4px; }
  .cd-unit { min-width: 36px; padding: 4px 6px; }
  .cd-num { font-size: 14px; }
  .stats-bar { gap: 20px; flex-wrap: wrap; }
}
</style>
</head>
<body>

    </div>
  </div>
</footer>

<script>
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function teamColor(team) {
  var t = (team || '').toUpperCase();
  if (t.indexOf('DCX') >= 0) return 'var(--crimson)';
  if (t.indexOf('CAMS') >= 0) return 'var(--gold)';
  return 'var(--navy)';
}

function teamClass(team) {
  var t = (team || '').toUpperCase();
  if (t.indexOf('DCX') >= 0) return 'dcx';
  if (t.indexOf('CAMS') >= 0) return 'cams';
  return 'cdps';
}

function teamRgb(tc) {
  if (tc === 'dcx') return '155,35,53';
  if (tc === 'cams') return '196,150,58';
  return '27,42,74';
}

function calendarUrl(evt) {
  var d = new Date(evt.PlannedDate);
  function pad(n) { return String(n).padStart(2, '0'); }
  var start = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + 'T' +
              (evt.Time ? evt.Time.replace(/[^0-9]/g,'').slice(0,4) : '1400') + '00';
  var endD = new Date(d.getTime() + 90 * 60000);
  var end = endD.getFullYear() + pad(endD.getMonth()+1) + pad(endD.getDate()) + 'T' +
            pad(endD.getHours()) + pad(endD.getMinutes()) + '00';
  var title = encodeURIComponent('Three60 — ' + (evt.Title || 'Monthly Connect'));
  var details = encodeURIComponent(
    'Agenda:\n30 min — ' + (evt.Activity || 'Team Activity') +
    '\n30 min — Show & Tell\n30 min — Open Discussion' +
    (evt.MeetLink ? '\n\nJoin: ' + evt.MeetLink : '')
  );
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + title +
         '&dates=' + start + '/' + end + '&details=' + details;
}

function parseEventDateTime(dateStr, timeStr) {
  var d = new Date(dateStr);
  if (timeStr) {
    var match = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
    if (match) {
      var hours = parseInt(match[1]);
      var mins = parseInt(match[2]);
      var ampm = match[3].toUpperCase();
      if (ampm === 'PM' && hours !== 12) hours += 12;
      if (ampm === 'AM' && hours === 12) hours = 0;
      d.setHours(hours, mins, 0, 0);
    }
  }
  return d;
}

function initials(name) {
  return (name || '').split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
}

function dismissWelcome() {
  var banner = document.getElementById('welcome-banner');
  if (banner) banner.style.display = 'none';
  try { localStorage.setItem('three60_welcome_dismissed', '1'); } catch(e) {}
}

function openFormUrl(key) {
  var url = window._config && window._config[key];
  if (url && url.indexOf('http') === 0) window.open(url, '_blank');
  else alert('Form URL not configured yet. Add ' + key + ' to the Config tab in your Three60 sheet.');
}

function fireConfetti() {
  var c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  var colors = ['#9B2335', '#C4963A', '#1B2A4A', '#fff', '#F5F0E8'];
  for (var i = 0; i < 60; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 1.5 + 's';
    p.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    p.style.width = (4 + Math.random() * 6) + 'px';
    p.style.height = (4 + Math.random() * 6) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    c.appendChild(p);
  }
  setTimeout(function() { c.remove(); }, 4000);
}

function render(data) {
  var events = data.events || [];
  var wins = data.wins || [];
  var directory = data.directory || [];
  var config = data.config || {};
  var showAndTell = data.showAndTell || [];
  var ratings = data.ratings || [];

  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  events.sort(function(a, b) { return new Date(a.PlannedDate) - new Date(b.PlannedDate); });

  var futureEvents = events.filter(function(e) { return new Date(e.PlannedDate) >= today; });
  var pastEvents = events.filter(function(e) { return new Date(e.PlannedDate) < today; }).reverse();
  var nextEvent = futureEvents[0];
  var upcomingEvents = futureEvents.slice(1);

  var thirtyAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
  var recentWins = wins.filter(function(w) { return new Date(w.Timestamp || w.Date) >= thirtyAgo; });
  var allWins = wins.slice().reverse();

  var teams = {};
  directory.forEach(function(p) {
    var t = p.Team || 'Other';
    if (!teams[t]) teams[t] = {};
    var m = p.Manager || 'Unassigned';
    if (!teams[t][m]) teams[t][m] = [];
    teams[t][m].push(p);
  });

  var nextST = nextEvent ? showAndTell.find(function(s) { return s.EventTitle === nextEvent.Title && s.Status === 'Approved'; }) : null;

  var totalEvents = pastEvents.length;
  var totalMembers = directory.length;
  var totalWins = wins.length;
  var avgRating = ratings.length > 0 ? (ratings.reduce(function(s, r) { return s + Number(r.Rating || 0); }, 0) / ratings.length).toFixed(1) : '—';

  window._config = config;

  var html = '';

  // EVENTS
  html += '<section class="section" id="events"><div class="section-inner">';
  html += '<div class="section-eyebrow">Monthly Sessions</div>';
  html += '<div class="section-title">Upcoming events</div>';
  html += '<div class="section-subtitle">Each 90-min session — activity, Show &amp; Tell, open discussion.</div>';

  if (!localStorage.getItem('three60_welcome_dismissed')) {
    html += '<div class="welcome-banner" id="welcome-banner">';
    html += '<div class="welcome-icon">&#x1F44B;</div>';
    html += '<div class="welcome-content">';
    html += '<div class="welcome-title">Welcome to Three60!</div>';
    html += '<div class="welcome-text">We\'re a cross-team community of DCX, CDPS, and CAMS. Every month we meet for 90 minutes — a team activity, a Show &amp; Tell presentation, and open discussion. Jump in, get to know your colleagues, and share what you\'re working on.</div>';
    html += '<a class="welcome-cta" href="?page=directory" style="margin-right:8px">Join the directory</a>';
    html += '<button class="welcome-cta" style="background:transparent;color:var(--navy);border:1px solid var(--border)" onclick="dismissWelcome()">Got it</button>';
    html += '</div>';
    html += '<button class="welcome-close" onclick="dismissWelcome()" title="Dismiss">&times;</button>';
    html += '</div>';
  }

  if (!nextEvent && upcomingEvents.length === 0) {
    html += '<div style="text-align:center;padding:40px 20px;color:var(--muted)"><p style="font-size:18px;margin-bottom:6px">No upcoming events right now</p><p style="font-size:13px">Stay tuned — the next Three60 Connect will be announced soon!</p></div>';
  }

  if (nextEvent) {
    html += '<div class="featured-card"><div class="feat-header"><div class="feat-header-left">';
    html += '<span class="feat-badge">NEXT UP</span>';
    html += '<span class="feat-title">' + esc(nextEvent.Title) + '</span>';
    html += '</div><div class="countdown">';
    html += '<div class="cd-unit"><span class="cd-num" id="cd-d">--</span><span class="cd-label">Days</span></div>';
    html += '<span class="cd-sep">:</span>';
    html += '<div class="cd-unit"><span class="cd-num" id="cd-h">--</span><span class="cd-label">Hrs</span></div>';
    html += '<span class="cd-sep">:</span>';
    html += '<div class="cd-unit"><span class="cd-num" id="cd-m">--</span><span class="cd-label">Min</span></div>';
    html += '<span class="cd-sep">:</span>';
    html += '<div class="cd-unit"><span class="cd-num" id="cd-s">--</span><span class="cd-label">Sec</span></div>';
    html += '</div></div>';
    html += '<div class="feat-body"><div class="feat-info">';
    html += '<div class="feat-date">&#x1F4C5; ' + formatDate(nextEvent.PlannedDate) + (nextEvent.Time ? ' &middot; ' + esc(nextEvent.Time) : '') + '</div>';
    html += '<div class="feat-host"><div class="feat-host-dot" style="background:' + teamColor(nextEvent.HostTeam) + '"></div>Hosted by <strong style="color:var(--navy);margin-left:3px">' + esc(nextEvent.HostTeam || '') + '</strong></div>';
    html += '</div><div class="feat-agenda"><div class="agenda-label">Session agenda</div>';
    html += '<div class="agenda-item"><span class="agenda-time">30 min</span><div class="agenda-content"><div class="agenda-title">' + esc(nextEvent.Activity || 'Team Activity') + '</div>';
    if (nextEvent.ActivityDesc) html += '<div class="agenda-desc">' + esc(nextEvent.ActivityDesc) + '</div>';
    html += '</div></div>';
    html += '<div class="agenda-item"><span class="agenda-time">30 min</span><div class="agenda-content"><div class="agenda-title">Show &amp; Tell</div>';
    if (nextST) {
      var tc = teamClass(nextST.Team);
      html += '<div class="agenda-presenter"><div class="agenda-avatar" style="background:rgba(' + teamRgb(tc) + ',0.1);color:' + teamColor(nextST.Team) + '">' + initials(nextST.PresenterName) + '</div>';
      html += '<div><div class="agenda-p-name">' + esc(nextST.PresenterName) + ' <span class="agenda-p-team" style="background:rgba(' + teamRgb(tc) + ',0.1);color:' + teamColor(nextST.Team) + '">' + esc(nextST.Team) + '</span></div>';
      html += '<div class="agenda-p-topic">"' + esc(nextST.Topic) + '"</div></div></div>';
    } else {
      html += '<div class="agenda-desc" style="color:var(--navy);font-weight:600;cursor:pointer" onclick="openFormUrl(\'STFormURL\')">Submit a topic &rarr;</div>';
    }
    html += '</div></div>';
    html += '<div class="agenda-item"><span class="agenda-time">30 min</span><div class="agenda-content"><div class="agenda-title">Open Discussion</div><div class="agenda-desc">Q&amp;A and open floor</div></div></div>';
    html += '</div></div>';
    html += '<div class="feat-footer"><a href="' + calendarUrl(nextEvent) + '" target="_blank" class="btn-calendar">&#x1F4C5; Add to Google Calendar</a>';
    if (nextEvent.MeetLink) html += '<a href="' + esc(nextEvent.MeetLink) + '" target="_blank" class="btn-join">&#x1F3A5; Join</a>';
    html += '</div></div>';
    window._nextEventDate = parseEventDateTime(nextEvent.PlannedDate, nextEvent.Time);
  }

  if (upcomingEvents.length > 0) {
    html += '<div class="event-grid">';
    upcomingEvents.forEach(function(evt) {
      var st = showAndTell.find(function(s) { return s.EventTitle === evt.Title && s.Status === 'Approved'; });
      html += '<div class="event-card"><div class="event-header"><span class="badge-upcoming">Upcoming</span>';
      html += '<div class="event-title">' + esc(evt.Title) + '</div>';
      html += '<div class="event-date">' + formatDate(evt.PlannedDate) + (evt.Time ? ' &middot; ' + esc(evt.Time) : '') + '</div>';
      html += '<div class="event-host"><div class="event-host-dot" style="background:' + teamColor(evt.HostTeam) + '"></div>Hosted by <strong style="color:var(--navy);margin-left:3px">' + esc(evt.HostTeam || '') + '</strong></div></div>';
      html += '<div class="event-agenda"><div class="agenda-label">Agenda</div>';
      html += '<div class="agenda-item"><span class="agenda-time">30m</span><div class="agenda-content"><div class="agenda-title">' + esc(evt.Activity || 'Team Activity') + '</div></div></div>';
      html += '<div class="agenda-item"><span class="agenda-time">30m</span><div class="agenda-content"><div class="agenda-title">Show &amp; Tell</div>';
      if (st) html += '<div class="agenda-desc">' + esc(st.PresenterName) + ': "' + esc(st.Topic) + '"</div>';
      else html += '<div class="agenda-desc" style="color:var(--navy);font-weight:600;cursor:pointer" onclick="openFormUrl(\'STFormURL\')">Submit a topic &rarr;</div>';
      html += '</div></div>';
      html += '<div class="agenda-item"><span class="agenda-time">30m</span><div class="agenda-content"><div class="agenda-title">Open Discussion</div></div></div></div>';
      html += '<div class="event-footer"><a href="' + calendarUrl(evt) + '" target="_blank" class="btn-calendar">&#x1F4C5; Add to Google Calendar</a></div></div>';
    });
    html += '</div>';
  }
  html += '</div></section>';

  // WINS
  html += '<section class="wins-section" id="wins"><div class="wins-header"><div class="wins-title">&#x1F3C6; Wins <em>this month</em></div>';
  html += '<div class="wins-actions"><span class="wins-counter" id="wins-counter"></span>';
  html += '<button class="btn-win-submit" onclick="fireConfetti(); openFormUrl(\'WinFormURL\')">+ Submit a win</button></div></div>';
  html += '<div class="wins-track-wrap"><div class="wins-track" id="wins-track">';
  if (recentWins.length === 0) {
    html += '<div style="color:rgba(255,255,255,0.4);padding:20px;text-align:center;width:100%">No wins yet this month — be the first!</div>';
  }
  recentWins.forEach(function(w) {
    var tc = teamClass(w.Team);
    html += '<div class="win-card win-card-' + tc + '"><div class="win-team win-team-' + tc + '">' + esc(w.Team || '') + '</div>';
    html += '<div class="win-name">' + esc(w.Name || '') + '</div>';
    html += '<div class="win-desc">' + esc(w.Description || '') + '</div>';
    html += '<div class="win-date">' + (w.Timestamp ? formatDate(w.Timestamp) : w.Date ? formatDate(w.Date) : '') + '</div></div>';
  });
  html += '</div></div><div class="wins-dots" id="wins-dots"></div></section>';

  // TEAM
  html += '<section class="section section-white" id="team"><div class="section-inner">';
  html += '<div class="section-eyebrow">Our People</div><div class="section-title">Meet the team</div>';
  html += '<div class="section-subtitle">Pick a team to see members, grouped by manager.</div>';
  html += '<div class="team-tabs">';
  ['DCX', 'CDPS', 'CAMS'].forEach(function(t) {
    html += '<span class="team-tab" onclick="showTeam(\'' + t + '\', this)">' + t + '</span>';
  });
  html += '</div>';
  html += '<div id="team-placeholder" class="team-placeholder"><div class="team-placeholder-icon">&#x1F465;</div>';
  html += '<div class="team-placeholder-text">Select a team above</div>';
  html += '<div class="team-placeholder-sub">Click DCX, CDPS, or CAMS to meet the people</div></div>';

  ['DCX', 'CDPS', 'CAMS'].forEach(function(teamName) {
    html += '<div id="team-' + teamName + '" class="team-panel">';
    var managers = teams[teamName] || {};
    Object.keys(managers).forEach(function(mgr) {
      html += '<div class="manager-group"><div class="manager-header mgr-' + teamClass(teamName) + '">' + esc(mgr) + ' &mdash; Manager</div>';
      html += '<div class="team-cards">';
      managers[mgr].forEach(function(p) {
        var tc = teamClass(teamName);
        html += '<div class="team-card"><div class="tc-top tc-top-' + tc + '"><div class="tc-geo"></div>';
        html += '<div class="tc-avatar" style="background:' + teamColor(teamName) + ';color:' + (tc === 'cams' ? 'var(--navy)' : '#fff') + '">';
        if (p.PhotoURL) html += '<img src="' + esc(p.PhotoURL) + '" alt="' + esc(p.Name) + '">';
        else html += initials(p.Name);
        html += '</div></div><div class="tc-body">';
        html += '<div class="tc-name">' + esc(p.Name || '') + '</div>';
        html += '<div class="tc-role">' + esc(p.Role || '') + (p.Location ? ' &middot; ' + esc(p.Location) : '') + '</div>';
        html += '<div class="tc-divider"></div>';
        if (p.Beverage) html += '<div class="tc-fact"><span class="tc-fact-icon">&#x2615;</span><div class="tc-fact-val"><b>' + esc(p.BeverageType || 'Coffee') + '</b> &middot; ' + esc(p.Beverage) + '</div></div>';
        if (p.Weekend) html += '<div class="tc-fact"><span class="tc-fact-icon">&#x1F324;</span><div class="tc-fact-val">' + esc(p.Weekend) + '</div></div>';
        if (p.HiddenTalent) html += '<div class="tc-fact"><span class="tc-fact-icon">&#x2728;</span><div class="tc-fact-val tc-fact-talent">' + esc(p.HiddenTalent) + '</div></div>';
        html += '</div></div>';
      });
      html += '</div></div>';
    });
    html += '<div style="text-align:center;margin-top:16px"><a href="?page=directory" class="btn-view-all">View full directory &rarr;</a></div></div>';
  });
  html += '</div></section>';

  // THE BUZZ
  html += '<section class="buzz-section" id="the-buzz"><div class="buzz-inner">';
  html += '<div class="buzz-header"><div class="buzz-title">&#x1F41D; The <em>Buzz</em></div>';
  html += '<div class="buzz-sub">Poll &amp; question of the month</div></div>';
  html += '<div class="buzz-grid"><div class="buzz-card">';
  html += '<div class="buzz-label">&#x1F5F3;&#xFE0F; Poll of the month</div>';
  html += '<div class="buzz-question" id="buzz-poll-q">"' + esc(config.PollQuestion || 'What should our next team activity be?') + '"</div>';
  html += '<div class="buzz-options" id="buzz-poll">';
  var pollOpts = (config.PollOptions || 'Option A,Option B,Option C').split(',');
  pollOpts.forEach(function(opt) {
    html += '<div class="buzz-option" onclick="votePoll(this, \'' + esc(opt.trim()).replace(/'/g, "\\'") + '\')"><div class="buzz-radio"></div><span class="buzz-opt-text">' + esc(opt.trim()) + '</span></div>';
  });
  html += '</div><div class="buzz-hint">Results shown at next connect</div></div>';
  html += '<div class="buzz-card"><div class="buzz-label">&#x1F4AC; Question of the month</div>';
  html += '<div class="buzz-question" id="buzz-q-q">"' + esc(config.BuzzQuestion || "What's the worst movie you secretly love?") + '"</div>';
  html += '<textarea class="buzz-textarea" id="buzz-answer" placeholder="Type your answer..."></textarea>';
  html += '<button class="buzz-submit-btn" onclick="submitBuzzAnswer()">Submit</button>';
  html += '<div class="buzz-hint">Answers shared anonymously at next session</div></div></div></div></section>';

  // STATS
  html += '<div class="stats-bar">';
  html += '<div class="stat"><span class="stat-num">' + totalEvents + '</span><span class="stat-label">Events held</span></div>';
  html += '<div class="stat"><span class="stat-num">' + totalMembers + '</span><span class="stat-label">Team members</span></div>';
  html += '<div class="stat"><span class="stat-num">' + totalWins + '</span><span class="stat-label">Wins celebrated</span></div>';
  html += '<div class="stat"><span class="stat-num">' + avgRating + '</span><span class="stat-label">Avg rating</span></div></div>';

  // ARCHIVE
  html += '<section class="section section-white" id="archive"><div class="section-inner">';
  html += '<div class="section-eyebrow">Archive</div><div class="section-title">Past events &amp; wins</div>';
  html += '<div class="section-subtitle">Everything from past sessions &mdash; all time.</div>';
  html += '<div class="archive-tabs"><span class="archive-tab active" onclick="showArchiveTab(\'events\', this)">Past Events</span>';
  html += '<span class="archive-tab" onclick="showArchiveTab(\'wins\', this)">All Wins</span></div>';

  html += '<div id="archive-events">';
  if (pastEvents.length === 0) html += '<p style="color:var(--muted);padding:20px 0">No past events yet.</p>';
  else {
    html += '<div class="past-grid">';
    pastEvents.slice(0, 3).forEach(function(evt) {
      var st = showAndTell.find(function(s) { return s.EventTitle === evt.Title; });
      html += '<div class="past-card"><div class="past-header"><div class="past-title">' + esc(evt.Title) + '</div>';
      html += '<div class="past-date">' + formatDate(evt.PlannedDate) + '</div></div>';
      if (st) html += '<div class="past-st">S&amp;T: <span>' + esc(st.PresenterName) + '</span></div>';
      if (evt.Summary) html += '<div class="past-desc">' + esc(evt.Summary) + '</div>';
      html += '<div class="past-links">';
      if (evt.RecordingURL) html += '<a href="' + esc(evt.RecordingURL) + '" target="_blank" class="past-link">&#x25B6; Recording</a>';
      if (evt.SlidesURL) html += '<a href="' + esc(evt.SlidesURL) + '" target="_blank" class="past-link">&#x1F4C4; Slides</a>';
      if (evt.NotesURL) html += '<a href="' + esc(evt.NotesURL) + '" target="_blank" class="past-link">&#x1F4DD; Notes</a>';
      html += '</div>';
      html += '<div class="star-row"><span class="star-label">Rate:</span>';
      for (var i = 1; i <= 5; i++) html += '<span class="star" onclick="rateEvent(this, ' + i + ', \'' + esc(evt.Title).replace(/'/g, "\\'") + '\')">&#x2605;</span>';
      html += '<span class="star-msg"></span></div></div>';
    });
    html += '</div>';
    if (pastEvents.length > 3) html += '<a href="?page=pastevents" class="btn-view-all">View all past events &rarr;</a>';
  }
  html += '</div>';

  html += '<div id="archive-wins" style="display:none">';
  if (allWins.length === 0) html += '<p style="color:var(--muted);padding:20px 0">No wins yet.</p>';
  else {
    html += '<div class="wins-archive-grid">';
    allWins.slice(0, 6).forEach(function(w) {
      var tc = teamClass(w.Team);
      html += '<div class="wa-card wa-card-' + tc + '"><div class="wa-team wa-team-' + tc + '">' + esc(w.Team || '') + '</div>';
      html += '<div class="wa-name">' + esc(w.Name || '') + '</div>';
      html += '<div class="wa-desc">' + esc(w.Description || '') + '</div>';
      html += '<div class="wa-date">' + (w.Timestamp ? formatDate(w.Timestamp) : w.Date ? formatDate(w.Date) : '') + '</div></div>';
    });
    html += '</div>';
    if (allWins.length > 6) html += '<a href="?page=allwins" class="btn-view-all">View all wins &rarr;</a>';
  }
  html += '</div></div></section>';

  // SUBMIT
  html += '<section class="submit-section"><h2>Want to get involved?</h2>';
  html += '<p>Submit a Show &amp; Tell topic or celebrate a team win.</p>';
  html += '<div class="submit-btns">';
  if (config.STFormURL) html += '<a href="' + esc(config.STFormURL) + '" target="_blank" class="btn-st">&#x1F3A4; Submit S&amp;T Topic</a>';
  else html += '<button class="btn-st" onclick="alert(\'Add STFormURL to Config sheet.\')">&#x1F3A4; Submit S&amp;T Topic</button>';
  if (config.WinFormURL) html += '<a href="' + esc(config.WinFormURL) + '" target="_blank" class="btn-win" onclick="fireConfetti()">&#x1F3C6; Submit a Win</a>';
  else html += '<button class="btn-win" onclick="fireConfetti()">&#x1F3C6; Submit a Win</button>';
  html += '</div></section>';

  document.getElementById('app').innerHTML = html;
  if (window._nextEventDate) startCountdown(window._nextEventDate);
  initWinsCarousel();
}

function startCountdown(target) {
  function tick() {
    var t = target - new Date();
    if (t <= 0) return;
    var el = function(id) { return document.getElementById(id); };
    if (el('cd-d')) el('cd-d').textContent = String(Math.floor(t / 864e5)).padStart(2, '0');
    if (el('cd-h')) el('cd-h').textContent = String(Math.floor(t % 864e5 / 36e5)).padStart(2, '0');
    if (el('cd-m')) el('cd-m').textContent = String(Math.floor(t % 36e5 / 6e4)).padStart(2, '0');
    if (el('cd-s')) el('cd-s').textContent = String(Math.floor(t % 6e4 / 1e3)).padStart(2, '0');
  }
  tick(); setInterval(tick, 1000);
}

function initWinsCarousel() {
  var track = document.getElementById('wins-track');
  if (!track) return;
  var cards = track.querySelectorAll('.win-card');
  if (cards.length <= 3) return;
  var dotsC = document.getElementById('wins-dots');
  var cardW = 234; var pos = 0; var visible = 3; var maxPos = cards.length - visible;
  for (var i = 0; i <= maxPos; i++) {
    var d = document.createElement('div');
    d.className = 'wins-dot' + (i === 0 ? ' active' : '');
    (function(idx) { d.onclick = function() { goTo(idx); }; })(i);
    dotsC.appendChild(d);
  }
  function goTo(i) {
    pos = i;
    track.style.transform = 'translateX(-' + pos * cardW + 'px)';
    document.querySelectorAll('.wins-dot').forEach(function(d, j) { d.className = 'wins-dot' + (j === pos ? ' active' : ''); });
    var counter = document.getElementById('wins-counter');
    if (counter) counter.textContent = (pos + 1) + ' / ' + (maxPos + 1);
  }
  goTo(0);
  setInterval(function() { goTo(pos >= maxPos ? 0 : pos + 1); }, 3500);
}

function showTeam(team, el) {
  document.getElementById('team-placeholder').style.display = 'none';
  document.querySelectorAll('.team-panel').forEach(function(p) { p.classList.remove('visible'); });
  document.querySelectorAll('.team-tab').forEach(function(t) { t.className = 'team-tab'; });
  el.classList.add('active-' + teamClass(team));
  var panel = document.getElementById('team-' + team);
  if (panel) panel.classList.add('visible');
}

function showArchiveTab(tab, el) {
  document.getElementById('archive-events').style.display = tab === 'events' ? 'block' : 'none';
  document.getElementById('archive-wins').style.display = tab === 'wins' ? 'block' : 'none';
  document.querySelectorAll('.archive-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
}

function rateEvent(star, val, eventTitle) {
  var row = star.parentElement;
  row.querySelectorAll('.star').forEach(function(s, i) { s.classList.toggle('lit', i < val); });
  var msg = row.querySelector('.star-msg');
  msg.textContent = 'Submitting...'; msg.classList.add('show');
  google.script.run
    .withSuccessHandler(function() { msg.textContent = '✓ Submitted!'; })
    .withFailureHandler(function() { msg.textContent = 'Error'; })
    .submitRating({ eventTitle: eventTitle, rating: val });
}

function votePoll(el, answer) {
  el.parentElement.querySelectorAll('.buzz-option').forEach(function(o) { o.classList.remove('voted'); });
  el.classList.add('voted');
  var question = document.getElementById('buzz-poll-q') ? document.getElementById('buzz-poll-q').textContent : '';
  google.script.run.submitBuzzPoll({ question: question, answer: answer });
}

function submitBuzzAnswer() {
  var answer = document.getElementById('buzz-answer').value.trim();
  if (!answer) return;
  var question = document.getElementById('buzz-q-q') ? document.getElementById('buzz-q-q').textContent : '';
  google.script.run.withSuccessHandler(function() {
    document.getElementById('buzz-answer').value = '';
    document.getElementById('buzz-answer').placeholder = 'Thanks! Submitted.';
  }).submitBuzzAnswer({ question: question, answer: answer });
}

google.script.run
  .withSuccessHandler(render)
  .withFailureHandler(function(err) {
    document.getElementById('app').innerHTML = '<div class="loading"><p style="color:var(--crimson)">Error loading data. Please refresh.</p><p style="font-size:11px;color:var(--muted)">' + err.message + '</p></div>';
  })
  .getData();
</script>
</body>
</html>
